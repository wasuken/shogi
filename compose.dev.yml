services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app          # ホットリロード用
      - /app/node_modules      # node_modules はコンテナ側を使う
    environment:
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev       # nodemon等

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    ports:
      - "8080:5173"            # Vite dev server等
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - server

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      PMA_HOST: db
    depends_on:
      - db
